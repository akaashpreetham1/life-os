<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Life OS</title>
  <style>
    :root {
      --bg: #fbf8f1;
      --paper: #fffefa;
      --paper-2: #f8f4ec;
      --ink: #172033;
      --muted: #687385;
      --line: #e7dfd1;
      --navy: #17213a;
      --crimson: #a51c30;
      --crimson-soft: #f8e8eb;
      --blue: #1d4ed8;
      --blue-soft: #e9f0ff;
      --green: #0f766e;
      --green-soft: #e6f4f1;
      --gold: #9a6a16;
      --gold-soft: #fbf1d8;
      --shadow: 0 14px 34px rgba(20, 33, 61, .055);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(165, 28, 48, .026), transparent 34rem),
        linear-gradient(180deg, #fbf8f1 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      min-height: 100vh;
      display: block;
    }

    .sidebar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 254, 250, .88);
      color: var(--ink);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      letter-spacing: -.02em;
      color: var(--navy);
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .menu {
      display: none;
      min-height: 40px;
      border-radius: 8px;
      background: var(--paper-2);
      color: var(--navy);
      font-weight: 800;
    }

    .nav, .spaces {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .nav {
      margin-left: auto;
    }

    .spaces .label {
      display: none;
    }

    .spaces {
      margin-left: 10px;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin: 0 0 2px;
    }

    .nav button, .spaces button {
      min-height: 32px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      background: transparent;
      color: #475467;
      font-weight: 800;
      text-align: left;
    }

    .nav button.active, .spaces button.active {
      background: white;
      color: var(--crimson);
      box-shadow: inset 0 0 0 1px rgba(165,28,48,.16);
    }

    .nav small, .spaces small {
      color: var(--muted);
      font-weight: 900;
    }

    .sidebar-note {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    main {
      min-width: 0;
      max-width: 1240px;
      margin: 0 auto;
      padding: 22px 30px 48px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
    }

    h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 3.6vw, 44px);
      line-height: 1;
      letter-spacing: -.035em;
      color: var(--navy);
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 9px;
      background: #f1ece3;
      color: #344054;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .pill.green { background: var(--green-soft); color: var(--green); }
    .pill.crimson { background: var(--crimson-soft); color: var(--crimson); }
    .pill.blue { background: var(--blue-soft); color: var(--blue); }
    .pill.gold { background: var(--gold-soft); color: var(--gold); }

    .panel {
      background: rgba(255, 254, 250, .74);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: none;
    }

    .pad { padding: 14px; }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -.01em;
      color: var(--navy);
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 16px;
      align-items: start;
    }

    .capture-stage {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .capture-box {
      padding: 16px;
      background: rgba(255, 254, 250, .8);
      border: 1px solid var(--line);
    }

    .capture-box .section-head {
      margin-bottom: 9px;
      padding: 0;
    }

    .capture-box .section-head .muted {
      font-size: 12px;
    }

    .big-input {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid #ddd2c2;
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 16px 84px 16px 16px;
      font-size: 18px;
      line-height: 1.35;
      outline-color: var(--crimson);
    }

    .capture-input-wrap {
      position: relative;
    }

    .voice-floating {
      position: absolute;
      right: 10px;
      bottom: 10px;
      min-height: 32px;
      border-radius: 999px;
      padding: 7px 12px;
      background: #f1ece3;
      border: 1px solid var(--line);
      color: var(--navy);
      font-weight: 900;
    }

    .voice-floating:hover {
      background: white;
      color: var(--crimson);
    }

    .toast {
      border: 1px solid rgba(15, 118, 110, .22);
      background: var(--green-soft);
      color: var(--green);
      border-radius: 8px;
      padding: 9px 12px;
      font-weight: 850;
    }

    .question-stack {
      display: grid;
      gap: 0;
      margin-top: 10px;
    }

    .question {
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 12px 0 0;
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .question strong {
      font-size: 13px;
      color: var(--navy);
    }

    .seg-row, .chip-row, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .seg, .chip, .secondary, .primary, .quiet {
      border-radius: 8px;
      min-height: 34px;
      padding: 7px 10px;
      font-weight: 850;
    }

    .seg, .chip, .secondary {
      background: #f4efe7;
      color: #344054;
      border: 1px solid transparent;
    }

    .seg.active, .chip.active {
      background: var(--crimson-soft);
      border-color: rgba(165,28,48,.28);
      color: var(--crimson);
    }

    .primary {
      background: var(--crimson);
      color: white;
      box-shadow: 0 1px 0 rgba(0,0,0,.04);
    }

    .quiet {
      background: transparent;
      color: var(--muted);
      padding-inline: 4px;
    }

    input, select, textarea.note-editor {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: var(--ink);
      padding: 10px 11px;
    }

    .inline-input {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 8px;
    }

    .focus-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 14px;
    }

    .area-tabs {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 14px;
    }

    .area-tabs button {
      white-space: nowrap;
      border-radius: 999px;
      padding: 7px 11px;
      background: #f4efe7;
      color: #475467;
      font-weight: 850;
    }

    .area-tabs button.active {
      background: var(--navy);
      color: white;
    }

    .rows {
      display: grid;
      gap: 9px;
    }

    .row-card {
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .row-title {
      font-weight: 850;
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }

    .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .row-actions button, .small-btn {
      border-radius: 8px;
      padding: 6px 8px;
      background: #f4efe7;
      color: #344054;
      font-size: 13px;
      font-weight: 850;
    }

    .row-actions .today-btn {
      background: var(--crimson-soft);
      color: var(--crimson);
    }

    .row-actions .complete-btn {
      background: var(--green-soft);
      color: var(--green);
    }

    .editor-grid {
      display: grid;
      gap: 10px;
    }

    .form-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    textarea.detail-text {
      min-height: 86px;
      resize: vertical;
    }

    .timer-card {
      text-align: center;
      display: grid;
      gap: 10px;
    }

    .timer {
      font-size: 46px;
      font-weight: 950;
      letter-spacing: -.03em;
      line-height: 1;
    }

    .side-stack {
      display: grid;
      gap: 14px;
    }

    .habit-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 400px;
      gap: 14px;
    }

    .habit-row {
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .habit-row.selected {
      border-color: rgba(165,28,48,.38);
      box-shadow: 0 0 0 3px rgba(165,28,48,.08);
    }

    .done-btn {
      min-width: 112px;
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--crimson);
      color: white;
      font-weight: 900;
    }

    #addCapture {
      min-width: 58px;
    }

    .done-btn.completed {
      background: var(--green);
      cursor: default;
      opacity: .88;
    }

    .done-btn:disabled {
      cursor: default;
    }

    .dots {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e4ded3;
    }

    .dot.on { background: var(--green); }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #eee7dc;
      color: #5b6472;
      font-size: 12px;
      font-weight: 900;
    }

    .day.on { background: var(--green-soft); color: var(--green); }
    .day.miss { background: #f8e7e7; color: #b42318; }

    .bars {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      align-items: end;
      height: 86px;
      margin: 12px 0 4px;
    }

    .bar {
      background: var(--green);
      border-radius: 8px 8px 3px 3px;
      min-height: 12px;
    }

    .notes-layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 14px;
      min-height: 580px;
    }

    .note-list {
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .note-preview {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      border-radius: 8px;
      padding: 10px;
      text-align: left;
    }

    .note-preview.active {
      border-color: rgba(165,28,48,.38);
      box-shadow: 0 0 0 3px rgba(165,28,48,.08);
    }

    .note-title {
      font-weight: 900;
      margin-bottom: 5px;
    }

    .note-editor {
      min-height: 400px;
      resize: vertical;
      border: 0 !important;
      font-size: 18px;
      line-height: 1.55;
      background: transparent !important;
      outline: none;
    }

    .editor-shell {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .empty {
      border: 1px dashed #c9bfaf;
      border-radius: 8px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.68);
    }

    .mobile-tabs {
      display: none;
      position: sticky;
      bottom: 0;
      z-index: 3;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px;
      border-top: 1px solid var(--line);
      background: rgba(247,243,234,.96);
      backdrop-filter: blur(12px);
    }

    .mobile-tabs button {
      border-radius: 8px;
      padding: 10px 5px;
      background: white;
      color: #344054;
      font-size: 12px;
      font-weight: 900;
    }

    .mobile-tabs button.active {
      background: var(--navy);
      color: white;
    }

    .hidden { display: none !important; }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 5;
        padding: 10px 14px;
        flex-wrap: wrap;
      }
      .brand {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }
      .menu { display: block; }
      .nav, .spaces, .sidebar-note { display: none; }
      .sidebar.open .nav, .sidebar.open .spaces, .sidebar.open .sidebar-note { display: grid; }
      main { padding: 18px 14px 78px; }
      .grid, .focus-layout, .habit-layout, .notes-layout { grid-template-columns: 1fr; }
      .topbar { display: grid; }
      .status { justify-content: flex-start; }
      .mobile-tabs { display: grid; }
    }

    @media (max-width: 620px) {
      h2 { font-size: 38px; }
      .subtitle { font-size: 14px; }
      .status { display: none; }
      .big-input { font-size: 18px; min-height: 116px; }
      .capture-box { padding: 13px; }
      .capture-box .section-head { align-items: flex-start; }
      .inline-input { grid-template-columns: 1fr; }
      .row-card, .habit-row { grid-template-columns: 1fr; }
      .row-actions { justify-content: flex-start; }
      .done-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <h1>Life OS</h1>
          <p>A private operating system for a full life.</p>
        </div>
        <button class="menu" id="menuButton">Menu</button>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="spaces">
        <p class="label">Space</p>
        <button data-space="personal"><span>Personal</span><small id="personalCount">0</small></button>
        <button data-space="shared"><span>Shared</span><small id="sharedCount">0</small></button>
        <button data-space="all"><span>All</span><small id="allCount">0</small></button>
      </div>
      <div class="sidebar-note">Prototype mode. In production, this becomes a private synced web app with login and a shared database.</div>
    </aside>

    <main>
      <section class="topbar">
        <div>
          <h2 id="screenTitle">Capture</h2>
          <p class="subtitle" id="screenSubtitle">Get it out of your head. Classify lightly.</p>
        </div>
        <div class="status">
          <span class="pill green" id="syncPill">Private - syncing</span>
          <span class="pill" id="spacePill">Personal</span>
        </div>
      </section>

      <section id="captureScreen"></section>
      <section id="focusScreen" class="hidden"></section>
      <section id="maintainScreen" class="hidden"></section>
      <section id="reflectScreen" class="hidden"></section>
    </main>
  </div>
  <div class="mobile-tabs" id="mobileTabs"></div>

  <script>
    const modes = [["capture","Capture"],["focus","Focus"],["maintain","Maintain"],["reflect","Reflect"]];
    const areas = ["HBS SA","Section B","Career","Health","Family","Relationship","Finances","Misc."];
    const uid = () => crypto.randomUUID();
    const today = () => new Date().toISOString().slice(0, 10);

    let cloudReady = false;
    let saveTimer = null;
    let state = JSON.parse(localStorage.getItem("lifeOSPolishedV1") || "null") || {
      mode: "capture",
      space: "personal",
      capture: { text: "", kind: "task", area: "Misc.", ownership: "me", delegatedTo: "", followUp: "" },
      selectedArea: "All",
      editingItem: "",
      toast: "",
      habitDraft: "",
      selectedHabit: "",
      selectedNote: "",
      timerSeconds: 25 * 60,
      timerRunning: false,
      timerTask: "",
      tasks: [
        { id: uid(), text: "Finalize SA budget follow-up", kind: "task", area: "HBS SA", space: "shared", owner: "Priya", delegatedTo: "Priya", followUp: "2026-07-11", due: "", notes: "", today: false, done: false, createdAt: Date.now() - 7000 },
        { id: uid(), text: "Career coffee chat list", kind: "task", area: "Career", space: "personal", owner: "Me", delegatedTo: "", followUp: "", due: "", notes: "", today: true, done: false, createdAt: Date.now() - 6000 },
        { id: uid(), text: "Plan Saturday date", kind: "task", area: "Relationship", space: "shared", owner: "Both", delegatedTo: "", followUp: "", due: "", notes: "", today: false, done: false, createdAt: Date.now() - 5000 }
      ],
      ideas: [
        { id: uid(), text: "Spring trek with Section B", kind: "idea", area: "Section B", space: "shared", owner: "Both", createdAt: Date.now() - 4000 },
        { id: uid(), text: "Tiny decision log for big choices", kind: "idea", area: "Misc.", space: "personal", owner: "Me", createdAt: Date.now() - 3000 }
      ],
      habits: [
        { id: uid(), name: "Workout", space: "personal", completedToday: false, lastDone: "yesterday", streak: [1,1,0,1,1,1,0], history: ["Jul 8 - 42 min","Jul 7 - 31 min","Jul 6 - 35 min"] },
        { id: uid(), name: "Sleep by 11:30", space: "personal", completedToday: true, lastDone: "today", streak: [1,0,1,1,1,1,1], history: ["Jul 8 - on time","Jul 7 - on time"] },
        { id: uid(), name: "Finance review", space: "personal", completedToday: false, lastDone: "5 days ago", streak: [0,0,1,0,0,0,0], history: ["Jul 3 - reviewed spend"] },
        { id: uid(), name: "Call family", space: "shared", completedToday: false, lastDone: "Sunday", streak: [0,1,0,0,0,0,1], history: ["Jul 5 - called home"] }
      ],
      notes: [
        { id: uid(), title: "Hate cardio, but it matters", text: "Hate cardio, but it is so important. Need to make it easier to start, not more heroic.", space: "personal", createdAt: Date.now() - 2000 },
        { id: uid(), title: "Felt scattered today", text: "Felt scattered, but the Life OS shape is starting to make sense. Need a calmer way to choose what matters today.", space: "personal", createdAt: Date.now() - 86400000 },
        { id: uid(), title: "Date night idea", text: "Low-key dinner, phones away, walk after.", space: "shared", createdAt: Date.now() - 92000000 }
      ]
    };
    if (!state.selectedHabit && state.habits[0]) state.selectedHabit = state.habits[0].id;
    if (!state.selectedNote && state.notes[0]) state.selectedNote = state.notes[0].id;
    state.capture = { text: "", kind: "task", area: "Misc.", ownership: "me", delegatedTo: "", followUp: "", ...state.capture };
    state.selectedArea = state.selectedArea || "All";
    state.habitDraft = state.habitDraft || "";
    state.toast = state.toast || "";
    state.editingItem = state.editingItem || "";
    state.tasks.forEach(t => { t.due ||= ""; t.notes ||= ""; });

    const $ = id => document.getElementById(id);
    const setSync = text => { if ($("syncPill")) $("syncPill").textContent = text; };
    const save = () => {
      localStorage.setItem("lifeOSPolishedV1", JSON.stringify(state));
      if (!cloudReady) return;
      setSync("Private - saving");
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(async () => {
        try {
          const response = await fetch("/api/state", {
            method: "PUT",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ state })
          });
          if (!response.ok) throw new Error("Save failed");
          setSync("Private - synced");
        } catch {
          setSync("Private - offline cache");
        }
      }, 450);
    };
    const scoped = item => state.space === "all" || item.space === state.space;
    const cap = value => String(value).charAt(0).toUpperCase() + String(value).slice(1);
    const esc = value => String(value).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

    function renderShell() {
      $("nav").innerHTML = modes.map(([key,label]) => `<button data-mode="${key}" class="${state.mode === key ? "active" : ""}"><span>${label}</span></button>`).join("");
      $("mobileTabs").innerHTML = modes.map(([key,label]) => `<button data-mode="${key}" class="${state.mode === key ? "active" : ""}">${label}</button>`).join("");
      document.querySelectorAll("[data-space]").forEach(btn => btn.classList.toggle("active", btn.dataset.space === state.space));
      $("personalCount").textContent = allItems().filter(x => x.space === "personal").length;
      $("sharedCount").textContent = allItems().filter(x => x.space === "shared").length;
      $("allCount").textContent = allItems().length;
      $("spacePill").textContent = state.space === "all" ? "All spaces" : cap(state.space);
      if ($("syncPill")) $("syncPill").textContent ||= cloudReady ? "Private - synced" : "Private - local";
    }

    function allItems() {
      return [...state.tasks.filter(t => !t.done), ...state.ideas, ...state.habits, ...state.notes];
    }

    function countMode(mode) {
      if (mode === "capture") return "";
      if (mode === "focus") return state.tasks.filter(t => !t.done && scoped(t)).length + state.ideas.filter(scoped).length;
      if (mode === "maintain") return state.habits.filter(scoped).length;
      return state.notes.filter(scoped).length;
    }

    function render() {
      renderShell();
      const copy = {
        capture: ["Capture", "Get it out of your head. Classify lightly."],
        focus: ["Focus", "Review life areas, choose today, and follow up."],
        maintain: ["Maintain", "Check off today's habits. Open one to see history."],
        reflect: ["Reflect", "Dump thoughts by voice or text."]
      };
      $("screenTitle").textContent = copy[state.mode][0];
      $("screenSubtitle").textContent = copy[state.mode][1];
      modes.forEach(([mode]) => $(`${mode}Screen`).classList.toggle("hidden", state.mode !== mode));
      renderCapture();
      renderFocus();
      renderMaintain();
      renderReflect();
      save();
    }

      $("focusScreen").innerHTML = `
        <div class="focus-layout">
          <section class="panel pad">
            <div class="section-head"><h3>Life Areas</h3><span class="muted">Edit, remove, or promote tasks to today.</span></div>
            <div class="area-tabs">

      const selected = state.habits.find(h => h.id === state.selectedHabit) || habits[0];
      $("maintainScreen").innerHTML = `
        <div class="habit-layout">
          <section class="panel pad">
            <div class="section-head">
              <h3>Today's Habits</h3>
              <span class="muted">One click marks today complete.</span>
            </div>
            <div class="inline-input" style="margin-bottom:12px">
              <input id="habitDraft" placeholder="Add a habit, e.g. Workout" value="${esc(state.habitDraft || "")}">
              <button class="primary" id="addHabit">Add habit</button>

            ${selected ? habitDetail(selected) : empty("Select a habit to see history.")}
          </aside>
        </div>`;

    function habitRow(h) {
      return `<article class="habit-row ${state.selectedHabit === h.id ? "selected" : ""}" data-select-habit="${h.id}">
        <div>
          <div class="row-title">${esc(h.name)}</div>
          <div class="seg-row">
            <span class="pill green">${h.streak.filter(Boolean).length} / 7</span>
            <span class="pill">Last done ${esc(h.lastDone)}</span>
            <span class="pill ${h.space === "shared" ? "blue" : ""}">${h.space}</span>
          </div>

        </div>

      </article>`;

    function habitDetail(h) {
      return `<div class="section-head">
          <div><h3>${esc(h.name)} History</h3><p class="muted">Double-click a habit row to focus its details.</p></div>
          <div class="actions"><button class="small-btn" data-edit-habit="${h.id}">Edit</button><button class="small-btn" data-delete-habit="${h.id}">Archive</button></div>
        </div>
        <div class="seg-row" style="margin-bottom:12px">
          <span class="pill green">${h.streak.filter(Boolean).length}-day rhythm</span>
          <span class="pill">This month 18 / 28</span>
        </div>
        <h3 style="font-size:15px;margin:14px 0 8px">Month Calendar</h3>
        <div class="calendar">${Array.from({length:28}, (_, i) => `<div class="day ${i % 5 === 1 ? "miss" : (i % 3 !== 1 ? "on" : "")}">${i + 1}</div>`).join("")}</div>
        <h3 style="font-size:15px;margin:18px 0 8px">Weekly Trend</h3>
        <div class="bars">${[45,68,52,75,62,84].map(v => `<div class="bar" style="height:${v}%"></div>`).join("")}</div>
        <h3 style="font-size:15px;margin:18px 0 8px">History</h3>
        <div class="rows">${h.history.map(x => `<div class="row-card"><div class="row-title">${esc(x)}</div></div>`).join("")}</div>`;
    }

    function renderReflect() {
      const notes = state.notes.filter(scoped).sort((a,b) => b.createdAt - a.createdAt);
      const note = state.notes.find(n => n.id === state.selectedNote) || notes[0];
      $("reflectScreen").innerHTML = `
        <div class="notes-layout">
          <section class="panel pad">
            <div class="section-head"><h3>Notes</h3><button class="small-btn" id="newNote">+ New note</button></div>
            <input id="noteSearch" placeholder="Search notes">
            <div class="note-list" style="margin-top:12px">${notes.length ? notes.map(notePreview).join("") : empty("No notes yet.")}</div>
          </section>
          <section class="panel pad editor-shell">
            ${note ? noteEditor(note) : empty("Create a note to start writing.")}
          </section>
        </div>`;
      initVoice("noteBody", "voiceNote", "noteVoiceStatus");
    }

    function notePreview(note) {
      return `<button class="note-preview ${state.selectedNote === note.id ? "active" : ""}" data-select-note="${note.id}">
        <div class="note-title">${esc(note.title || firstLine(note.text))}</div>
        <div class="muted">${new Date(note.createdAt).toLocaleString([], { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" })}</div>
        <div class="seg-row" style="margin-top:7px"><span class="pill ${note.space === "shared" ? "blue" : ""}">${note.space}</span></div>
      </button>`;
    }

    function noteEditor(note) {
      return `<div class="section-head">
          <div><h3>${esc(note.title || firstLine(note.text))}</h3><p class="muted">Saved just now</p></div>
          <select id="noteSpace" data-note-space="${note.id}"><option value="personal" ${note.space === "personal" ? "selected" : ""}>Personal</option><option value="shared" ${note.space === "shared" ? "selected" : ""}>Shared</option></select>
        </div>
        <textarea id="noteBody" class="note-editor" data-note-body="${note.id}" placeholder="Start typing...">${esc(note.text)}</textarea>
        <div class="actions">
          <button class="primary" id="voiceNote">Voice</button>
          <button class="secondary" data-delete-note="${note.id}">Delete</button>
          <span class="muted" id="noteVoiceStatus">Ready.</span>
        </div>`;

    function firstLine(text) {
      return String(text).split("\n")[0].slice(0, 42) || "Untitled";
    }

    function empty(text) {
      return `<div class="empty">${text}</div>`;
    }

    function syncCaptureInputs() {
      if ($("captureText")) state.capture.text = $("captureText").value;
      if ($("delegateTo")) state.capture.delegatedTo = $("delegateTo").value;
      if ($("followUp")) state.capture.followUp = $("followUp").value;
    }

    function addCapture() {
      syncCaptureInputs();
      const text = (state.capture.text || "").trim();
      if (!text) return;
      const base = { id: uid(), text, kind: state.capture.kind, area: state.capture.area, space: state.capture.ownership === "shared" ? "shared" : state.space === "shared" ? "shared" : "personal", owner: state.capture.ownership === "shared" ? "Both" : "Me", createdAt: Date.now() };
      if (state.capture.kind === "idea") {
        state.ideas.push(base);
      } else {
        const delegatedTo = state.capture.ownership === "delegated" ? ((state.capture.delegatedTo || "").trim() || "Someone") : "";
        state.tasks.push({ ...base, delegatedTo, followUp: state.capture.followUp || "", due: "", notes: "", today: false, done: false });
      }
      state.toast = `${state.capture.kind === "idea" ? "Idea" : "Task"} added to ${base.area}.`;
      state.capture.text = "";
      state.capture.delegatedTo = "";
      state.capture.followUp = "";
      render();
      window.clearTimeout(window.lifeOSToastTimer);
      window.lifeOSToastTimer = window.setTimeout(() => { state.toast = ""; render(); }, 2400);
    }

    function addHabit() {
      const name = (state.habitDraft || "").trim();
      if (!name) return;
      const habit = { id: uid(), name, space: state.space === "shared" ? "shared" : "personal", completedToday: false, lastDone: "never", streak: [0,0,0,0,0,0,0], history: [] };
      state.habits.unshift(habit);
      state.selectedHabit = habit.id;
      state.habitDraft = "";
      render();
    }

    function newNote() {
      const note = { id: uid(), title: "Untitled note", text: "", space: state.space === "shared" ? "shared" : "personal", createdAt: Date.now() };
      state.notes.unshift(note);
      state.selectedNote = note.id;
      render();
    }

    function initVoice(inputId, buttonId, statusId) {
      const button = $(buttonId);
      if (!button) return;
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        if ($(statusId)) $(statusId).textContent = "Voice is not available in this browser.";
        button.disabled = true;
        return;
      }
      button.onclick = () => {
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = "en-US";
        recognition.onstart = () => $(statusId).textContent = "Listening...";
        recognition.onend = () => $(statusId).textContent = "Saved just now.";
        recognition.onresult = event => {
          let transcript = "";
          for (let i = event.resultIndex; i < event.results.length; i++) transcript += event.results[i][0].transcript;
          const input = $(inputId);
          if (input) input.value = input.value ? `${input.value}\n${transcript.trim()}` : transcript.trim();
          if (inputId === "captureText") state.capture.text = input.value;
          if (input?.dataset.noteBody) {
            const note = state.notes.find(n => n.id === input.dataset.noteBody);
            note.text = input.value;
            note.title = firstLine(note.text);
            save();
          }
        };
        recognition.start();
      };
    }

    document.addEventListener("click", event => {
      const mode = event.target.closest("[data-mode]")?.dataset.mode;
      if (mode) { state.mode = mode; render(); return; }
      const space = event.target.closest("[data-space]")?.dataset.space;
      if (space) { state.space = space; render(); return; }
      const kind = event.target.closest("[data-capture-kind]")?.dataset.captureKind;
      if (kind) { syncCaptureInputs(); state.capture.kind = kind; render(); return; }
      const owner = event.target.closest("[data-capture-ownership]")?.dataset.captureOwnership;
      if (owner) { syncCaptureInputs(); state.capture.ownership = owner; render(); return; }
      const area = event.target.closest("[data-capture-area]")?.dataset.captureArea || event.target.closest("[data-area-tab]")?.dataset.areaTab;
      if (area) { syncCaptureInputs(); event.target.closest("[data-area-tab]") ? state.selectedArea = area : state.capture.area = area; render(); return; }
      const todayId = event.target.closest("[data-today]")?.dataset.today;
      if (todayId) { const t = state.tasks.find(x => x.id === todayId); t.today = !t.today; render(); return; }
      const completeTask = event.target.closest("[data-complete-task]")?.dataset.completeTask;
      if (completeTask) { const t = state.tasks.find(x => x.id === completeTask); t.done = true; if (state.timerTask === completeTask) state.timerTask = ""; render(); return; }
      const pomoId = event.target.closest("[data-start-pomo]")?.dataset.startPomo;
      if (pomoId) { state.timerTask = pomoId; state.timerRunning = true; render(); return; }
      const promoteId = event.target.closest("[data-promote]")?.dataset.promote;
      if (promoteId) {
        const idea = state.ideas.find(x => x.id === promoteId);
        state.tasks.push({ ...idea, id: uid(), kind: "task", delegatedTo: "", followUp: "", today: false, done: false });
        state.ideas = state.ideas.filter(x => x.id !== promoteId);
        render(); return;
      }
      const remove = event.target.closest("[data-remove-item]")?.dataset.removeItem;
      if (remove) { const [kindName, id] = remove.split(":"); kindName === "task" ? state.tasks = state.tasks.filter(x => x.id !== id) : state.ideas = state.ideas.filter(x => x.id !== id); render(); return; }
      const edit = event.target.closest("[data-edit-item]")?.dataset.editItem;
      if (edit) { state.editingItem = edit; render(); return; }
      if (event.target.closest("[data-close-editor]")) { state.editingItem = ""; render(); return; }
      if (event.target.closest("[data-save-editor]")) { state.editingItem = ""; render(); return; }
      const clearDelegation = event.target.closest("[data-clear-delegation]")?.dataset.clearDelegation;
      if (clearDelegation) { const t = state.tasks.find(x => x.id === clearDelegation); t.delegatedTo = ""; t.followUp = ""; render(); return; }
      const selectHabit = event.target.closest("[data-select-habit]")?.dataset.selectHabit;
      if (selectHabit && !event.target.closest("[data-habit-done]")) { state.selectedHabit = selectHabit; render(); return; }
      const habitDone = event.target.closest("[data-habit-done]")?.dataset.habitDone;
      if (habitDone) { const h = state.habits.find(x => x.id === habitDone); if (!h.completedToday) { h.completedToday = true; h.lastDone = "today"; h.streak[h.streak.length - 1] = 1; h.history.unshift(`${new Date().toLocaleDateString([], { month:"short", day:"numeric" })} - done`); } render(); return; }
      const deleteHabit = event.target.closest("[data-delete-habit]")?.dataset.deleteHabit;
      if (deleteHabit) { state.habits = state.habits.filter(x => x.id !== deleteHabit); state.selectedHabit = state.habits[0]?.id || ""; render(); return; }
      const selectNote = event.target.closest("[data-select-note]")?.dataset.selectNote;
      if (selectNote) { state.selectedNote = selectNote; render(); return; }
      const deleteNote = event.target.closest("[data-delete-note]")?.dataset.deleteNote;
      if (deleteNote) { state.notes = state.notes.filter(x => x.id !== deleteNote); state.selectedNote = state.notes[0]?.id || ""; render(); return; }
      if (event.target.id === "addCapture") addCapture();
      if (event.target.id === "addHabit") addHabit();
      if (event.target.id === "newNote") newNote();
      if (event.target.id === "toggleTimer") { state.timerRunning = !state.timerRunning; render(); }
      if (event.target.id === "resetTimer") { state.timerSeconds = 25 * 60; state.timerRunning = false; render(); }
      if (event.target.id === "menuButton") $("sidebar").classList.toggle("open");
    });

    document.addEventListener("input", event => {
      if (event.target.id === "captureText") {
        state.capture.text = event.target.value;
        save();
        return;
      }
      if (event.target.id === "delegateTo") {
        state.capture.delegatedTo = event.target.value;
        save();
        return;
      }
      if (event.target.id === "followUp") {
        state.capture.followUp = event.target.value;
        save();
        return;
      }
      if (event.target.id === "habitDraft") {
        state.habitDraft = event.target.value;
        save();
        return;
      }
      const editField = event.target.dataset.editField;
      if (editField && state.editingItem) {
        const [kindName, id] = state.editingItem.split(":");
        const item = kindName === "task" ? state.tasks.find(x => x.id === id) : state.ideas.find(x => x.id === id);
        if (item) item[editField] = event.target.value;
        save();
        return;
      }
      const noteId = event.target.dataset.noteBody;
      if (noteId) {
        const note = state.notes.find(n => n.id === noteId);
        note.text = event.target.value;
        note.title = firstLine(note.text);
        save();
      }
    });

    document.addEventListener("change", event => {
      const editField = event.target.dataset.editField;
      if (editField && state.editingItem) {
        const [kindName, id] = state.editingItem.split(":");
        const item = kindName === "task" ? state.tasks.find(x => x.id === id) : state.ideas.find(x => x.id === id);
        if (item) item[editField] = event.target.value;
        render();
        return;
      }
      const noteId = event.target.dataset.noteSpace;
      if (noteId) {
        const note = state.notes.find(n => n.id === noteId);
        note.space = event.target.value;
        render();
      }
    });

    setInterval(() => {
      if (!state.timerRunning) return;
      state.timerSeconds = Math.max(0, state.timerSeconds - 1);
      if (state.timerSeconds === 0) state.timerRunning = false;
      render();
    }, 1000);

    async function loadCloudState() {
      try {
        const response = await fetch("/api/state", { cache: "no-store" });
        if (!response.ok) throw new Error("Sync unavailable");
        const payload = await response.json();
        if (payload?.state) {
          state = { ...state, ...payload.state, capture: { ...state.capture, ...(payload.state.capture || {}) } };
          localStorage.setItem("lifeOSPolishedV1", JSON.stringify(state));
        }
        cloudReady = true;
        render();
        setSync("Private - synced");
      } catch {
        cloudReady = false;
        render();
        setSync("Private - local");
      }
    }

    render();
    loadCloudState();
  </script>
</body>
</html>
